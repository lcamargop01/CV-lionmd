<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lion MD Payroll Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    :root {
      --lion-gold: #C9A84C;
      --lion-dark: #1a1a2e;
      --lion-navy: #16213e;
      --lion-blue: #0f3460;
      --lion-accent: #e94560;
    }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; }
    .sidebar { background: var(--lion-dark); min-height: 100vh; width: 260px; transition: width 0.3s; }
    .sidebar-collapsed { width: 70px; }
    .nav-item { transition: all 0.2s; border-left: 3px solid transparent; }
    .nav-item:hover, .nav-item.active { background: rgba(201,168,76,0.12); border-left-color: var(--lion-gold); }
    .nav-item.active span { color: var(--lion-gold); }
    .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .btn-primary { background: var(--lion-gold); color: white; transition: all 0.2s; }
    .btn-primary:hover { background: #b8943d; transform: translateY(-1px); }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-outline { border: 1.5px solid var(--lion-gold); color: var(--lion-gold); }
    .btn-outline:hover { background: var(--lion-gold); color: white; }
    .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    .badge-approved { background: #d1fae5; color: #065f46; }
    .badge-flagged { background: #fef3c7; color: #92400e; }
    .badge-sync { background: #dbeafe; color: #1e40af; }
    .badge-async { background: #f3e8ff; color: #6b21a8; }
    .badge-orderly { background: #ffe4e6; color: #be123c; }
    .table-row:hover { background: #fafaf0; }
    .upload-zone { border: 2px dashed #cbd5e1; border-radius: 12px; transition: all 0.2s; }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--lion-gold); background: rgba(201,168,76,0.05); }
    .stat-card { border-radius: 12px; padding: 20px; }
    .modal-backdrop { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    .tab-active { border-bottom: 2px solid var(--lion-gold); color: var(--lion-gold); font-weight: 600; }
    .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--lion-gold); border-radius: 50%; width: 36px; height: 36px; animation: spin 0.8s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    input[type="number"] { -moz-appearance: textfield; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .role-cv { --lion-gold: #2563eb; }
    .tooltip { position: relative; }
    .tooltip:hover::after { content: attr(data-tip); position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; white-space: nowrap; z-index: 100; }
    select, input[type="text"], input[type="email"], input[type="number"] {
      border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 8px 12px; font-size: 14px;
      transition: border-color 0.2s; outline: none;
    }
    select:focus, input[type="text"]:focus, input[type="email"]:focus, input[type="number"]:focus {
      border-color: var(--lion-gold);
    }
    .progress-bar { background: linear-gradient(90deg, var(--lion-gold), #f59e0b); height: 6px; border-radius: 3px; transition: width 0.5s; }
  </style>
</head>
<body class="bg-gray-100">

<!-- Loading Overlay -->
<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="spinner mb-3"></div>
  <p class="text-gray-600 font-medium" id="loadingMsg">Processing...</p>
  <div class="w-64 bg-gray-200 rounded-full h-2 mt-3 hidden" id="progressWrapper">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed top-4 right-4 z-50 hidden">
  <div class="flex items-center gap-3 bg-white border border-gray-200 shadow-lg rounded-xl px-5 py-4 min-w-[280px]">
    <i id="toastIcon" class="fas fa-check-circle text-green-500 text-xl"></i>
    <span id="toastMsg" class="text-gray-700 font-medium text-sm"></span>
  </div>
</div>

<!-- Role Selector Modal (Login) -->
<div id="roleModal" class="fixed inset-0 modal-backdrop z-50 flex items-center justify-center">
  <div class="card p-8 w-full max-w-md mx-4">
    <div class="text-center mb-6">
      <div class="w-20 h-20 rounded-2xl mx-auto mb-4 flex items-center justify-center" style="background: linear-gradient(135deg, #1a1a2e, #C9A84C);">
        <i class="fas fa-paw text-white text-3xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Lion MD Payroll Portal</h1>
      <p class="text-gray-500 text-sm mt-1">Select your access level to continue</p>
    </div>
    <div class="space-y-3">
      <button onclick="setRole('admin')" class="w-full flex items-center gap-4 p-4 rounded-xl border-2 border-gray-200 hover:border-yellow-500 hover:bg-yellow-50 transition-all group">
        <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background:#1a1a2e;">
          <i class="fas fa-crown text-yellow-400 text-xl"></i>
        </div>
        <div class="text-left">
          <div class="font-semibold text-gray-800">Lion MD Admin</div>
          <div class="text-xs text-gray-500">Full access — payroll, contractors, exports, rates</div>
        </div>
        <i class="fas fa-arrow-right ml-auto text-gray-300 group-hover:text-yellow-500 transition-colors"></i>
      </button>
      <button onclick="setRole('carevalidate')" class="w-full flex items-center gap-4 p-4 rounded-xl border-2 border-gray-200 hover:border-blue-500 hover:bg-blue-50 transition-all group">
        <div class="w-12 h-12 rounded-xl flex items-center justify-center bg-blue-600">
          <i class="fas fa-hospital text-white text-xl"></i>
        </div>
        <div class="text-left">
          <div class="font-semibold text-gray-800">CareValidate</div>
          <div class="text-xs text-gray-500">View only — see total owed to Lion MD</div>
        </div>
        <i class="fas fa-arrow-right ml-auto text-gray-300 group-hover:text-blue-500 transition-colors"></i>
      </button>
    </div>
  </div>
</div>

<!-- App Layout -->
<div id="app" class="flex hidden">

  <!-- Sidebar -->
  <div id="sidebar" class="sidebar flex flex-col fixed left-0 top-0 z-40 h-screen">
    <div class="p-5 border-b border-white/10 flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style="background: linear-gradient(135deg, #C9A84C, #f59e0b);">
        <i class="fas fa-paw text-white text-lg"></i>
      </div>
      <div id="sidebarTitle" class="overflow-hidden">
        <div class="font-bold text-white text-sm">Lion MD</div>
        <div class="text-xs text-gray-400">Payroll Portal</div>
      </div>
    </div>

    <nav class="flex-1 p-3 space-y-1 overflow-y-auto" id="sidebarNav">
      <!-- Nav items injected by JS based on role -->
    </nav>

    <div class="p-3 border-t border-white/10">
      <button onclick="logout()" class="nav-item w-full flex items-center gap-3 px-3 py-3 rounded-lg text-gray-400 hover:text-white">
        <i class="fas fa-sign-out-alt w-5 text-center flex-shrink-0"></i>
        <span class="text-sm sidebar-text">Switch Role</span>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col min-w-0 overflow-x-hidden" style="margin-left: 260px;">
    <!-- Top Bar -->
    <div class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-30 gap-3">
      <div class="flex items-center gap-3">
        <h2 id="pageTitle" class="text-lg font-semibold text-gray-800">Dashboard</h2>
        <span id="periodBadge" class="hidden px-3 py-1 rounded-full text-xs font-semibold text-white" style="background: var(--lion-gold);"></span>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <select id="sessionSelector" onchange="onSessionChange(this.value)" class="text-sm px-2 py-1.5 max-w-[180px]">
          <option value="">Select Period...</option>
        </select>
        <div id="roleTag" class="text-xs font-semibold px-2 py-1 rounded-full whitespace-nowrap"></div>
      </div>
    </div>

    <!-- Page Content -->
    <main class="flex-1 p-6 overflow-auto min-w-0" id="mainContent">
      <!-- Injected by JS -->
    </main>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════
let state = {
  role: null, // 'admin' | 'carevalidate'
  periods: [],        // grouped periods [{period_key, period_label, files:[], total_cases, ...}]
  currentPeriod: null, // the selected period object
  currentSummary: null,
  contractors: [],
  rates: [],
  currentPage: 'dashboard'
}

// ════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════
const $ = id => document.getElementById(id)
const fmt = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n || 0)
const fmtNum = (n) => new Intl.NumberFormat('en-US').format(n || 0)

function showToast(msg, type = 'success') {
  const icons = { success: 'fa-check-circle text-green-500', error: 'fa-times-circle text-red-500', info: 'fa-info-circle text-blue-500', warning: 'fa-exclamation-triangle text-yellow-500' }
  $('toastIcon').className = `fas ${icons[type] || icons.success} text-xl`
  $('toastMsg').textContent = msg
  $('toast').classList.remove('hidden')
  setTimeout(() => $('toast').classList.add('hidden'), 3500)
}

function showLoading(msg = 'Processing...', showProgress = false) {
  $('loadingMsg').textContent = msg
  $('loadingOverlay').classList.remove('hidden')
  if (showProgress) { $('progressWrapper').classList.remove('hidden') }
  else { $('progressWrapper').classList.add('hidden') }
}

function hideLoading() { $('loadingOverlay').classList.add('hidden') }

function setProgress(pct) { $('progressBar').style.width = pct + '%' }

async function api(path, options = {}) {
  const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...options })
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || `API error ${res.status}`) }
  return res.json()
}

function visitTypeLabel(vt) {
  const map = { ASYNC_TEXT_EMAIL: 'Async', SYNC_PHONE: 'Sync Phone', SYNC_VIDEO: 'Sync Video', SYNC_IN_PERSON: 'Sync In Person', NO_SHOW: 'No Show', ORDERLY: 'OrderlyMeds' }
  return map[vt] || vt
}

function visitTypeBadge(vt, fee, isOrderly) {
  // Primary: use the is_orderly flag stored at upload time (org-name based)
  if (isOrderly) return `<span class="status-badge badge-orderly">OrderlyMeds</span>`
  // Fallback for legacy data: low fee heuristic
  if (fee === 17 || (typeof fee === 'number' && fee > 0 && fee < 20 && vt === 'ASYNC_TEXT_EMAIL')) {
    return `<span class="status-badge badge-orderly">OrderlyMeds</span>`
  }
  if (vt === 'ASYNC_TEXT_EMAIL') return `<span class="status-badge badge-async">Async</span>`
  if (vt && vt.startsWith('SYNC')) return `<span class="status-badge badge-sync">${visitTypeLabel(vt)}</span>`
  return `<span class="status-badge" style="background:#f1f5f9;color:#64748b">${visitTypeLabel(vt)}</span>`
}

// ════════════════════════════════════════════════════
// ROLE + AUTH
// ════════════════════════════════════════════════════
function setRole(role) {
  state.role = role
  $('roleModal').classList.add('hidden')
  $('app').classList.remove('hidden')
  buildNav()
  loadInitialData()

  const roleTag = $('roleTag')
  if (role === 'admin') {
    roleTag.textContent = '👑 Admin'
    roleTag.className = 'text-xs font-semibold px-3 py-1 rounded-full bg-yellow-100 text-yellow-800'
  } else {
    roleTag.textContent = '🏥 CareValidate'
    roleTag.className = 'text-xs font-semibold px-3 py-1 rounded-full bg-blue-100 text-blue-800'
  }
}

function logout() {
  state = { role: null, periods: [], currentPeriod: null, currentSummary: null, contractors: [], rates: [], currentPage: 'dashboard' }
  $('roleModal').classList.remove('hidden')
  $('app').classList.add('hidden')
  $('sessionSelector').innerHTML = '<option value="">Select Period...</option>'
}

// ════════════════════════════════════════════════════
// NAV
// ════════════════════════════════════════════════════
function buildNav() {
  const adminNav = [
    { id: 'dashboard', icon: 'fa-chart-pie', label: 'Dashboard' },
    { id: 'upload', icon: 'fa-upload', label: 'Upload Report' },
    { id: 'consults', icon: 'fa-table', label: 'Consult Records' },
    { id: 'payroll', icon: 'fa-money-bill-wave', label: 'Contractor Payroll' },
    { id: 'contractors', icon: 'fa-user-md', label: 'Contractors' },
    { id: 'rates', icon: 'fa-sliders-h', label: 'Payment Rates' },
    { id: 'carevalidate', icon: 'fa-eye', label: 'CareValidate View' },
  ]
  const cvNav = [
    { id: 'cv_dashboard', icon: 'fa-chart-bar', label: 'Summary' },
    { id: 'cv_detail', icon: 'fa-list', label: 'Detail View' },
  ]

  const items = state.role === 'admin' ? adminNav : cvNav
  $('sidebarNav').innerHTML = items.map(item => `
    <button onclick="navigate('${item.id}')" id="nav_${item.id}"
      class="nav-item w-full flex items-center gap-3 px-3 py-3 rounded-lg text-gray-400 hover:text-white transition-all">
      <i class="fas ${item.icon} w-5 text-center flex-shrink-0"></i>
      <span class="text-sm sidebar-text">${item.label}</span>
    </button>
  `).join('')
}

function navigate(page) {
  state.currentPage = page
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'))
  const navEl = $(`nav_${page}`)
  if (navEl) navEl.classList.add('active')

  const titles = { dashboard:'Dashboard', upload:'Upload Report', consults:'Consult Records', payroll:'Contractor Payroll', contractors:'Contractors', rates:'Payment Rates', carevalidate:'CareValidate View', cv_dashboard:'Summary', cv_detail:'Detail View' }
  $('pageTitle').textContent = titles[page] || page

  const pages = { dashboard: renderDashboard, upload: renderUpload, consults: renderConsults, payroll: renderPayroll, contractors: renderContractors, rates: renderRates, carevalidate: renderCVView, cv_dashboard: renderCVDashboard, cv_detail: renderCVDetail }
  if (pages[page]) pages[page]()
}

// ════════════════════════════════════════════════════
// INITIAL DATA
// ════════════════════════════════════════════════════
async function loadInitialData() {
  showLoading('Loading data...')
  try {
    state.periods = await api('/api/sessions')
    state.contractors = await api('/api/contractors')
    state.rates = await api('/api/rates')
    populateSessionSelector()

    if (state.periods.length > 0) {
      await selectPeriod(state.periods[0].period_key)
    }

    navigate(state.role === 'admin' ? 'dashboard' : 'cv_dashboard')
  } catch(e) {
    showToast('Error loading data: ' + e.message, 'error')
  } finally {
    hideLoading()
  }
}

function populateSessionSelector() {
  const sel = $('sessionSelector')
  sel.innerHTML = '<option value="">Select Period...</option>' + state.periods.map(p =>
    `<option value="${p.period_key}">${p.period_label} (${p.files.length} file${p.files.length>1?'s':''})</option>`
  ).join('')
  if (state.currentPeriod) sel.value = state.currentPeriod.period_key
}

async function selectPeriod(pk) {
  if (!pk) return
  state.currentPeriod = state.periods.find(p => p.period_key === pk)
  if (state.currentPeriod) {
    $('sessionSelector').value = pk
    const badge = $('periodBadge')
    badge.textContent = state.currentPeriod.period_label
    badge.classList.remove('hidden')
    showLoading('Loading summary...')
    try {
      state.currentSummary = await api(`/api/summary/period/${pk}`)
    } catch(e) { console.error(e) }
    finally { hideLoading() }
    navigate(state.currentPage)
  }
}

async function onSessionChange(pk) {
  await selectPeriod(pk)
}

// ════════════════════════════════════════════════════
// DASHBOARD PAGE
// ════════════════════════════════════════════════════
function renderDashboard() {
  if (!state.currentPeriod || !state.currentSummary) {
    $('mainContent').innerHTML = `
      <div class="flex flex-col items-center justify-center h-64 text-center">
        <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-4" style="background:#f0f2f5">
          <i class="fas fa-upload text-gray-300 text-2xl"></i>
        </div>
        <h3 class="text-lg font-semibold text-gray-600">No Data Yet</h3>
        <p class="text-gray-400 text-sm mt-1 mb-4">Upload a CareValidate report to get started</p>
        <button onclick="navigate('upload')" class="btn-primary px-6 py-2.5 rounded-xl font-medium text-sm">
          <i class="fas fa-upload mr-2"></i>Upload Report
        </button>
      </div>`
    return
  }
  const s = state.currentSummary
  const t = s.totals || {}
  const margin = (t.total_margin || 0)
  const marginPct = t.total_carevalidate > 0 ? ((margin / t.total_carevalidate) * 100).toFixed(1) : 0

  $('mainContent').innerHTML = `
    <div class="space-y-6">
      <!-- Stats Row -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="stat-card card flex items-center gap-4">
          <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background:rgba(201,168,76,0.1)">
            <i class="fas fa-file-medical text-yellow-500 text-xl"></i>
          </div>
          <div>
            <div class="text-2xl font-bold text-gray-800">${fmtNum(t.total_cases)}</div>
            <div class="text-xs text-gray-500 font-medium">Total Cases</div>
          </div>
        </div>
        <div class="stat-card card flex items-center gap-4">
          <div class="w-12 h-12 rounded-xl flex items-center justify-center bg-blue-50">
            <i class="fas fa-building text-blue-500 text-xl"></i>
          </div>
          <div>
            <div class="text-2xl font-bold text-gray-800">${fmt(t.total_carevalidate)}</div>
            <div class="text-xs text-gray-500 font-medium">CareValidate Owes Us</div>
          </div>
        </div>
        <div class="stat-card card flex items-center gap-4">
          <div class="w-12 h-12 rounded-xl flex items-center justify-center bg-purple-50">
            <i class="fas fa-user-md text-purple-500 text-xl"></i>
          </div>
          <div>
            <div class="text-2xl font-bold text-gray-800">${fmt(t.total_contractor)}</div>
            <div class="text-xs text-gray-500 font-medium">We Owe Contractors</div>
          </div>
        </div>
        <div class="stat-card card flex items-center gap-4">
          <div class="w-12 h-12 rounded-xl flex items-center justify-center bg-green-50">
            <i class="fas fa-chart-line text-green-500 text-xl"></i>
          </div>
          <div>
            <div class="text-2xl font-bold ${margin >= 0 ? 'text-green-600' : 'text-red-600'}">${fmt(margin)}</div>
            <div class="text-xs text-gray-500 font-medium">Net Margin (${marginPct}%)</div>
          </div>
        </div>
      </div>

      <!-- Charts Row -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Visit Type Breakdown -->
        <div class="card p-5">
          <h3 class="font-semibold text-gray-700 mb-4 flex items-center gap-2">
            <i class="fas fa-chart-pie text-yellow-500"></i> Visit Type Breakdown
          </h3>
          <canvas id="visitTypeChart" height="200"></canvas>
        </div>

        <!-- Top Contractors -->
        <div class="card p-5">
          <h3 class="font-semibold text-gray-700 mb-4 flex items-center gap-2">
            <i class="fas fa-user-md text-purple-500"></i> Contractor Earnings
          </h3>
          <div class="space-y-3" id="contractorBars"></div>
        </div>
      </div>

      <!-- Doctor Summary Table -->
      <div class="card p-5">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-semibold text-gray-700 flex items-center gap-2">
            <i class="fas fa-table text-blue-500"></i> Payroll Summary by Doctor
            ${s.flaggedCount > 0 ? `<span class="status-badge badge-flagged"><i class="fas fa-flag mr-1"></i>${s.flaggedCount} Flagged</span>` : ''}
          </h3>
          <div class="flex gap-2">
            <button onclick="navigate('payroll')" class="btn-outline px-4 py-2 rounded-xl text-sm font-medium">
              <i class="fas fa-file-invoice-dollar mr-2"></i>View Payroll
            </button>
            <button onclick="exportGusto()" class="btn-primary px-4 py-2 rounded-xl text-sm font-medium">
              <i class="fas fa-file-excel mr-2"></i>Export Gusto
            </button>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm" style="min-width:760px">
            <thead>
              <tr class="border-b border-gray-100">
                <th class="text-left pb-3 text-gray-500 font-semibold px-3">Doctor / Contractor</th>
                <th class="text-right pb-3 text-gray-500 font-semibold px-3 whitespace-nowrap">Cases</th>
                <th class="text-right pb-3 text-gray-500 font-semibold px-3 whitespace-nowrap">Async</th>
                <th class="text-right pb-3 text-gray-500 font-semibold px-3 whitespace-nowrap">Sync</th>
                <th class="text-right pb-3 text-gray-500 font-semibold px-3 whitespace-nowrap">Orderly</th>
                <th class="text-right pb-3 text-gray-500 font-semibold px-3 whitespace-nowrap">CV Pays Us</th>
                <th class="text-right pb-3 text-gray-500 font-semibold px-3 whitespace-nowrap">We Pay</th>

function renderFileQueue() {
  const container = $('fileQueue')

    if (clearBtn) clearBtn.classList.add('hidden')
    return
  }

  container.classList.remove('hidden')
  if (clearBtn) clearBtn.classList.remove('hidden')
  if (btn) { btn.disabled = false; btn.classList.remove('opacity-50','cursor-not-allowed') }
  if (label) label.textContent = `Upload ${fileQueue.length} File${fileQueue.length>1?'s':''}`

  container.innerHTML = fileQueue.map(item => `
    <div class="flex items-center gap-3 bg-green-50 border border-green-100 rounded-xl px-4 py-3" id="qitem_${item.id}">
      <i class="fas fa-file-excel text-green-500"></i>

        <div class="font-medium text-gray-700 text-sm truncate">${item.file.name}</div>
        <div class="text-xs text-gray-500">${fmtNum(item.rows.length)} records found</div>
      </div>
      <span class="text-xs px-2 py-1 bg-green-100 text-green-700 rounded-full font-semibold" id="qstatus_${item.id}">Ready</span>

function openFilePicker(e) {
  // prevent double-fire if click came from inside the zone on a child element
  e.stopPropagation()
  $('fileInput').click()
}

async function handleFiles(fileList) {
  const files = Array.from(fileList)
  // Reset the input so the same file can be re-added after removal
  if ($('fileInput')) $('fileInput').value = ''

  for (const file of files) {
    if (!file.name.match(/\.xlsx?$/i)) { showToast(`${file.name} is not an Excel file`, 'warning'); continue }
    if (fileQueue.some(q => q.file.name === file.name)) { showToast(`${file.name} already in queue`, 'info'); continue }

    // Show inline spinner inside the drop zone, NOT the full-screen loading overlay
    // (full-screen overlay blocks FileReader callbacks in some browsers)
    const dz = $('dropZone')
    if (dz) dz.innerHTML = `
      <div class="flex flex-col items-center gap-3 py-2">
        <div class="spinner"></div>
        <p class="text-sm text-gray-500">Reading <strong>${file.name}</strong>…</p>
      </div>`

    try {
      const rows = await readExcelFile(file)
      const id = ++uploadQueueIdCounter
      fileQueue.push({ file, rows, id })
      showToast(`Added: ${file.name} (${fmtNum(rows.length)} records)`, 'success')
    } catch(e) {
      showToast(`Error reading ${file.name}: ${e.message}`, 'error')
    } finally {
      // Restore the drop zone
      renderUpload()
    }
  }
}

function removeFromQueue(id) {
  fileQueue = fileQueue.filter(q => q.id !== id)
  renderFileQueue()
}

function clearQueue() {
  fileQueue = []
  if ($('fileInput')) $('fileInput').value = ''
  renderUpload()
}

function readExcelFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader()
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true })
        const sheetName = wb.SheetNames[0]
        const ws = wb.Sheets[sheetName]
        const jsonData = XLSX.utils.sheet_to_json(ws, { raw: false, defval: null })
        const rows = []
        let flaggedIds = null
        if (wb.SheetNames.includes('Flagged')) {
          const flagData = XLSX.utils.sheet_to_json(wb.Sheets['Flagged'], { raw: false, defval: null })
          flaggedIds = new Set()
          flagData.forEach(row => {
            const flag = row['FLAG'] || row['Flag'] || ''
            if (typeof flag === 'string' && flag.toUpperCase().includes('FLAG')) {
              flaggedIds.add(row['Case ID'] || '')
            }
          })
        }
        jsonData.forEach(row => {
          const caseId = row['Case ID'] || row['case_id'] || ''
          const visitType = row['Visit Type'] || row['visit_type'] || ''
          let rawFee = row['Consult Fee'] || row['consult_fee']
          if (typeof rawFee === 'string' && rawFee.startsWith('=')) rawFee = null
          if (rawFee !== null) rawFee = parseFloat(rawFee) || null
          let decisionDate = row['Decision date'] || row['decision_date'] || ''
          if (decisionDate instanceof Date) decisionDate = decisionDate.toISOString().split('T')[0]
          rows.push({
            case_id: caseId,
            case_id_short: row['Case ID (short)'] || row['case_id_short'] || '',
            organization_name: row['Organization Name'] || row['organization_name'] || '',
            patient_name: row['Patient Name'] || row['patient_name'] || '',
            doctor_name: row['Doctor Name'] || row['doctor_name'] || '',
            decision_date: decisionDate,
            decision_status: row['Decision Status'] || row['decision_status'] || 'Approved',
            visit_type: visitType,
            raw_fee: rawFee,
            is_flagged: flaggedIds ? flaggedIds.has(caseId) : false
          })
        })
        resolve(rows)
      } catch(err) { reject(err) }
    }
    reader.onerror = () => reject(new Error('Failed to read file'))
    reader.readAsArrayBuffer(file)
  })
}

const CHUNK_SIZE = 2000  // rows per HTTP request (~600KB each, well under limits)

async function processUploadQueue() {
  if (fileQueue.length === 0) return
  const month = parseInt($('uploadMonth').value)
  const year = parseInt($('uploadYear').value)
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December']
  const label = `${monthNames[month-1]} ${year}`

  showLoading(`Uploading ${fileQueue.length} file${fileQueue.length>1?'s':''}…`, true)
  setProgress(5)

  let lastPeriodKey = null
  let totalAdded = 0
  let totalSkipped = 0

  for (let i = 0; i < fileQueue.length; i++) {
    const item = fileQueue[i]
    const statusEl = $(`qstatus_${item.id}`)
    if (statusEl) { statusEl.textContent = 'Uploading…'; statusEl.className = 'text-xs px-2 py-1 bg-blue-100 text-blue-700 rounded-full font-semibold' }

    try {
      const allRows = item.rows
      const totalChunks = Math.ceil(allRows.length / CHUNK_SIZE) || 1
      let sessionId = null
      let fileAdded = 0
      let fileSkipped = 0

      for (let c = 0; c < totalChunks; c++) {
        const chunk = allRows.slice(c * CHUNK_SIZE, (c + 1) * CHUNK_SIZE)
        const isLastChunk = (c === totalChunks - 1)

        // Progress within this file
        const fileProgress = Math.round((c / totalChunks) * 80)
        const overallProgress = Math.round(((i / fileQueue.length) + (c / totalChunks) / fileQueue.length) * 85) + 5
        setProgress(overallProgress)
        if (statusEl) statusEl.textContent = `Chunk ${c+1}/${totalChunks}…`

        let result
        if (c === 0) {
          // First chunk: create session
          result = await api('/api/upload', {
            method: 'POST',
            body: JSON.stringify({
              filename: item.file.name,
              source_label: item.file.name,
              period_label: label,
              period_month: month,
              period_year: year,
              rows: chunk,
              is_last_chunk: isLastChunk
            })
          })
          sessionId = result.session_id
          lastPeriodKey = result.period_key
        } else {
          // Subsequent chunks: append to existing session
          result = await api('/api/upload/chunk', {
            method: 'POST',
            body: JSON.stringify({
              session_id: sessionId,
              rows: chunk,
              is_last_chunk: isLastChunk
            })
          })
        }

        fileAdded += result.new_cases_added || 0
        fileSkipped += result.skipped_duplicates || 0
      }

      totalAdded += fileAdded
      totalSkipped += fileSkipped

      if (statusEl) {
        const skipped = fileSkipped > 0 ? ` (${fmtNum(fileSkipped)} dupes skipped)` : ''
        statusEl.textContent = `✓ ${fmtNum(fileAdded)} added${skipped}`
        statusEl.className = 'text-xs px-2 py-1 bg-green-100 text-green-700 rounded-full font-semibold'
      }
    } catch(e) {
      if (statusEl) { statusEl.textContent = '✗ Error'; statusEl.className = 'text-xs px-2 py-1 bg-red-100 text-red-600 rounded-full font-semibold' }
      showToast(`Error uploading ${item.file.name}: ${e.message}`, 'error')
    }

    setProgress(Math.round(((i+1) / fileQueue.length) * 90))
  }

  // Refresh
  state.periods = await api('/api/sessions')
  populateSessionSelector()
  if (lastPeriodKey) await selectPeriod(lastPeriodKey)
  setProgress(100)

  const skippedMsg = totalSkipped > 0 ? ` · ${fmtNum(totalSkipped)} duplicates skipped` : ''
  showToast(`✅ ${fmtNum(totalAdded)} new cases added for ${label}${skippedMsg}`, 'success')
  fileQueue = []
  hideLoading()
  navigate('dashboard')
}

// Delete a single file from a period
async function deleteFile(sessionId, label) {
  if (!confirm(`Remove file "${label}"? Its cases will be deleted from this period.`)) return
  await api(`/api/sessions/${sessionId}`, { method: 'DELETE' })
  state.periods = await api('/api/sessions')
  if (state.currentPeriod) {
    const stillExists = state.periods.find(p => p.period_key === state.currentPeriod.period_key)
    if (stillExists) {
      await selectPeriod(state.currentPeriod.period_key)
    } else {
      state.currentPeriod = state.periods[0] || null
      state.currentSummary = null
    }
  }
  populateSessionSelector()
  showToast('File removed', 'info')
  renderUpload()
}

// Delete entire period (all files)
async function deletePeriod(periodKey, label) {
  if (!confirm(`Delete ALL data for "${label}"? This removes all files for this month.`)) return
  await api(`/api/periods/${periodKey}`, { method: 'DELETE' })
  state.periods = await api('/api/sessions')
  if (state.currentPeriod?.period_key === periodKey) {
    state.currentPeriod = state.periods[0] || null
    state.currentSummary = null
  }
  populateSessionSelector()
  showToast(`Deleted ${label}`, 'info')
  renderUpload()
}

function debounceSearch(val) {
  clearTimeout(searchTimer)
  consultsState.search = val
  searchTimer = setTimeout(() => loadConsultsPage(1), 400)
}

async function filterConsults() {
  consultsState.doctor = $('doctorFilter')?.value || ''
  consultsState.visitType = $('vtFilter')?.value || ''
  await loadConsultsPage(1)
}

async function loadConsultsPage(page) {
  consultsState.page = page
  const params = new URLSearchParams({
    period_key: state.currentPeriod.period_key,
    page, limit: 50
  })
  if (consultsState.search) params.set('search', consultsState.search)
  if (consultsState.doctor) params.set('doctor_name', consultsState.doctor)
  if (consultsState.visitType) params.set('visit_type', consultsState.visitType)

  try {
    const result = await api('/api/consults?' + params)
    consultsState.data = result.data
    consultsState.total = result.total
    renderConsultsTable(result.data, result.total, page)

function downloadPaystub() {
  if (!currentPaystubData) return
  const { contractor, session, summary } = currentPaystubData
  const { jsPDF } = window.jspdf

  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' })
  const pageW = doc.internal.pageSize.getWidth()

  // Header bar
  doc.setFillColor(26, 26, 46)
  doc.rect(0, 0, pageW, 30, 'F')
  doc.setTextColor(201, 168, 76)
  doc.setFontSize(22)
  doc.setFont('helvetica', 'bold')
  doc.text('LION MD', 15, 18)
  doc.setTextColor(200, 200, 200)
  doc.setFontSize(9)
  doc.setFont('helvetica', 'normal')
  doc.text('Independent Contractor Payment Statement', 15, 25)
  doc.setTextColor(255, 255, 255)
  doc.text(session?.period_label || '', pageW - 15, 18, { align: 'right' })
  doc.setFontSize(8)
  doc.text('Issued: ' + new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }), pageW - 15, 25, { align: 'right' })

  // Contractor info
  doc.setTextColor(50, 50, 50)
  doc.setFontSize(12)
  doc.setFont('helvetica', 'bold')
  doc.text(contractor?.name || '', 15, 42)
  doc.setFont('helvetica', 'normal')
  doc.setFontSize(9)
  doc.setTextColor(100, 100, 100)
  doc.text(contractor?.company || 'Lion MD', 15, 48)
  if (contractor?.ein_ssn) doc.text('EIN/SSN: ' + contractor.ein_ssn, 15, 54)

  // Summary box
  doc.setFillColor(247, 244, 255)
  doc.roundedRect(pageW - 90, 36, 75, 30, 3, 3, 'F')
  doc.setTextColor(139, 92, 246)
  doc.setFontSize(18)
  doc.setFont('helvetica', 'bold')
  doc.text(fmt(summary?.total_pay), pageW - 52, 49, { align: 'center' })
  doc.setFontSize(8)
  doc.setFont('helvetica', 'normal')
  doc.setTextColor(100, 100, 100)
  doc.text('Total Payment', pageW - 52, 56, { align: 'center' })
  doc.text(`${fmtNum(summary?.total_cases)} Cases`, pageW - 52, 61, { align: 'center' })

  // Breakdown line
  let yPos = 72
  const rows = []
  if (summary?.async_count > 0) rows.push([`${fmtNum(summary.async_count)} Async Text/Email`, `${fmtNum(summary.async_count)} × rate`, fmt(summary.async_pay)])
  if (summary?.sync_count > 0) rows.push([`${fmtNum(summary.sync_count)} Sync (Phone/Video)`, `${fmtNum(summary.sync_count)} × rate`, fmt(summary.sync_pay)])
  if (summary?.orderly_count > 0) rows.push([`${fmtNum(summary.orderly_count)} OrderlyMeds`, `${fmtNum(summary.orderly_count)} × rate`, fmt(summary.orderly_pay)])

  if (rows.length > 0) {
    doc.autoTable({
      startY: yPos,
      head: [['Service Type', 'Quantity', 'Amount']],
      body: rows,
      foot: [['', 'TOTAL', fmt(summary?.total_pay)]],
      theme: 'grid',
      headStyles: { fillColor: [26, 26, 46], textColor: [201, 168, 76], fontStyle: 'bold', fontSize: 9 },
      footStyles: { fillColor: [245, 245, 245], textColor: [80, 80, 80], fontStyle: 'bold', fontSize: 10 },
      styles: { fontSize: 9, cellPadding: 3 },
      columnStyles: { 2: { halign: 'right', fontStyle: 'bold', textColor: [139, 92, 246] } },
      margin: { left: 15, right: 15 },
      tableWidth: pageW - 30
    })
    yPos = doc.lastAutoTable.finalY + 10
  }

  // Detail table
  const detailRows = (currentPaystubData.consults || []).map(r => [
    r.case_id_short || r.case_id?.substring(0, 8),
    (r.decision_date || '').substring(0, 10),
    r.patient_name,
    r.organization_name,
    visitTypeLabel(r.visit_type),
    fmt(r.contractor_fee)
  ])

  doc.autoTable({
    startY: yPos,
    head: [['Case ID', 'Date', 'Patient', 'Organization', 'Type', 'Amount']],
    body: detailRows,
    theme: 'striped',
    headStyles: { fillColor: [240, 240, 245], textColor: [80, 80, 80], fontStyle: 'bold', fontSize: 8 },
    styles: { fontSize: 7, cellPadding: 2 },
    columnStyles: { 5: { halign: 'right', fontStyle: 'bold', textColor: [139, 92, 246] } },
    margin: { left: 15, right: 15 },
    tableWidth: pageW - 30
  })

  // Footer
  const totalPages = doc.internal.getNumberOfPages()
  for (let i = 1; i <= totalPages; i++) {
    doc.setPage(i)
    doc.setFillColor(26, 26, 46)
    doc.rect(0, doc.internal.pageSize.getHeight() - 12, pageW, 12, 'F')
    doc.setTextColor(150, 150, 150)
    doc.setFontSize(7)
    doc.text('Lion MD Payroll Portal · Confidential', 15, doc.internal.pageSize.getHeight() - 4)
    doc.text(`Page ${i} of ${totalPages}`, pageW - 15, doc.internal.pageSize.getHeight() - 4, { align: 'right' })
  }

  const fileName = `${contractor?.name?.replace(/\s+/g, '_')}_${session?.period_label?.replace(/\s+/g, '_')}_Paystub.pdf`
  doc.save(fileName)
  showToast('PDF downloaded!', 'success')
}

        </div>
        <input type="hidden" id="ctId"/>
        <div class="flex gap-3 mt-6">
          <button onclick="saveContractor()" class="flex-1 btn-primary py-3 rounded-xl font-semibold">Save</button>
          <button onclick="$('contractorModal').classList.add('hidden')" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 font-medium hover:bg-gray-50">Cancel</button>
        </div>
      </div>
    </div>`
}

function openContractorModal(contractor = null) {
  $('contractorModalTitle').textContent = contractor ? 'Edit Contractor' : 'Add Contractor'
  $('ctId').value = contractor?.id || ''
  $('ctName').value = contractor?.name || ''
  $('ctCompany').value = contractor?.company || ''
  $('ctEin').value = contractor?.ein_ssn || ''
  $('ctEmail').value = contractor?.email || ''
  $('contractorModal').classList.remove('hidden')
}

async function saveContractor() {
  const id = $('ctId').value
  const data = { name: $('ctName').value, company: $('ctCompany').value, ein_ssn: $('ctEin').value, email: $('ctEmail').value }
  if (!data.name) { showToast('Name is required', 'warning'); return }
  try {
    if (id) {
      await api(`/api/contractors/${id}`, { method: 'PUT', body: JSON.stringify({ ...data, is_active: 1 }) })
    } else {
      await api('/api/contractors', { method: 'POST', body: JSON.stringify(data) })
    }
    state.contractors = await api('/api/contractors')
    $('contractorModal').classList.add('hidden')
    showToast('Contractor saved!', 'success')
    renderContractors()
  } catch(e) { showToast('Error: ' + e.message, 'error') }
}

async function deleteContractor(id, name) {
  if (!confirm(`Archive contractor "${name}"?`)) return
  await api(`/api/contractors/${id}`, { method: 'DELETE' })
  state.contractors = await api('/api/contractors')
  showToast('Contractor archived', 'info')
  renderContractors()
}

// RATES PAGE
// ════════════════════════════════════════════════════
function renderRates() {
  $('mainContent').innerHTML = `

      <div class="card p-4 flex items-start gap-3">
        <i class="fas fa-info-circle text-blue-400 mt-0.5 flex-shrink-0"></i>
        <p class="text-sm text-gray-600">
          <strong>CareValidate Rate</strong> = what CareValidate pays Lion MD per case. &nbsp;·&nbsp;
          <strong>Contractor Rate</strong> = what Lion MD pays each contractor per case.
        </p>
      </div>

      <!-- Rates table card -->
      <div class="card overflow-hidden">
        <div class="px-5 py-4 border-b border-gray-100">
          <h3 class="font-semibold text-gray-700">Payment Rates by Visit Type</h3>
          <p class="text-xs text-gray-400 mt-0.5">Changes take effect for new uploads only</p>
        </div>
        <!-- Column headers -->
        <div class="grid px-5 py-2 bg-gray-50 border-b border-gray-100" style="grid-template-columns:1fr 140px 140px 110px 80px;gap:12px;">
          <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Visit Type</span>
          <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide">CV Pays Us</span>
          <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide">We Pay Contractor</span>
          <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Margin</span>
          <span></span>
        </div>
        <div id="ratesTable">
          ${state.rates.map(r => `
            <div class="grid items-center px-5 py-3 border-b border-gray-50 hover:bg-gray-50 transition-colors" id="rate_${r.id}" style="grid-template-columns:1fr 140px 140px 110px 80px;gap:12px;">
              <div>
                <div class="font-semibold text-gray-800 text-sm">${r.label || visitTypeLabel(r.visit_type)}</div>
                <div class="text-xs text-gray-400 font-mono mt-0.5">${r.visit_type}</div>
              </div>
              <div class="relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none">$</span>
                <input type="number" id="cv_${r.id}" value="${r.carevalidate_rate}" step="0.01" min="0"
                  class="w-full" style="padding-left:1.6rem"/>
              </div>
              <div class="relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none">$</span>
                <input type="number" id="ct_${r.id}" value="${r.contractor_rate}" step="0.01" min="0"
                  class="w-full" style="padding-left:1.6rem"/>
              </div>
              <div>
                <span class="text-sm font-semibold" id="margin_${r.id}"
                  style="color:${r.carevalidate_rate - r.contractor_rate >= 0 ? '#16a34a' : '#dc2626'}">
                  ${fmt(r.carevalidate_rate - r.contractor_rate)}
                </span>
              </div>
              <div>
                <button onclick="saveRate(${r.id})" class="btn-primary px-3 py-1.5 rounded-lg text-xs font-semibold w-full">
                  Save
                </button>
              </div>
            </div>`).join('')}
        </div>
      </div>

      <!-- OrderlyMeds note -->
      <div class="card p-4 bg-amber-50 border border-amber-200">
        <div class="flex items-start gap-3">
          <i class="fas fa-lightbulb text-amber-500 mt-0.5 flex-shrink-0"></i>
          <div class="text-sm text-amber-700">
            <strong>OrderlyMeds Note:</strong> If the organization name contains "OrderlyMeds", the consult is automatically classified as OrderlyMeds regardless of visit type or fee amount.
          </div>
        </div>
      </div>
    </div>`

  // Live margin calculation
  state.rates.forEach(r => {
    const cvInput = $(`cv_${r.id}`)
    const ctInput = $(`ct_${r.id}`)
    if (cvInput && ctInput) {
      const update = () => {
        const m = parseFloat(cvInput.value || 0) - parseFloat(ctInput.value || 0)
        const el = $(`margin_${r.id}`)
        if (el) { el.textContent = fmt(m); el.style.color = m >= 0 ? '#16a34a' : '#dc2626' }
      }
      cvInput.addEventListener('input', update)
      ctInput.addEventListener('input', update)
    }
  })
}

async function saveRate(id) {
  const cv = parseFloat($(`cv_${id}`).value)
  const ct = parseFloat($(`ct_${id}`).value)
  const rate = state.rates.find(r => r.id === id)
  try {
    await api(`/api/rates/${id}`, { method: 'PUT', body: JSON.stringify({ carevalidate_rate: cv, contractor_rate: ct, label: rate?.label }) })
    state.rates = await api('/api/rates')
    showToast('Rate saved!', 'success')
    renderRates()
  } catch(e) { showToast('Error: ' + e.message, 'error') }
}

// ════════════════════════════════════════════════════
// GUSTO EXPORT
// ════════════════════════════════════════════════════
async function exportGusto() {
  if (!state.currentPeriod) { showToast('Please select a period first', 'warning'); return }
  showLoading('Generating Gusto export...')
  try {
    const data = await api(`/api/export/gusto/period/${state.currentPeriod.period_key}`)
    
    const ws_data = [
      ['Contractor Name', 'Company', 'EIN/SSN', 'Email', 'Period', 'Total Cases', 'Total Pay', 'Async Cases', 'Async Pay', 'Sync Cases', 'Sync Pay', 'OrderlyMeds Cases', 'OrderlyMeds Pay']
    ]
    data.forEach(row => {
      ws_data.push([
        row.contractor_name || '',
        row.company || '',
        row.ein_ssn || '',
        row.email || '',
        row.period_label || '',
        row.total_cases || 0,
        row.total_pay || 0,
        row.async_count || 0,
        row.async_pay || 0,
        row.sync_count || 0,
        row.sync_pay || 0,
        row.orderly_count || 0,
        row.orderly_pay || 0
      ])
    })

    const wb = XLSX.utils.book_new()
    const ws = XLSX.utils.aoa_to_sheet(ws_data)
    ws['!cols'] = [18, 16, 14, 24, 14, 10, 12, 10, 12, 10, 12, 14, 14].map(w => ({ wch: w }))
    XLSX.utils.book_append_sheet(wb, ws, 'Gusto Payroll')

    // Summary sheet
    const summaryData = [['Lion MD Payroll Export'], ['Period:', state.currentPeriod.period_label], ['Generated:', new Date().toLocaleDateString()], [''], ['Total Contractors:', data.length], ['Total Cases:', data.reduce((s, r) => s + (r.total_cases || 0), 0)], ['Total Payout:', data.reduce((s, r) => s + (r.total_pay || 0), 0)]]
    const summaryWs = XLSX.utils.aoa_to_sheet(summaryData)
    XLSX.utils.book_append_sheet(wb, summaryWs, 'Summary')

    XLSX.writeFile(wb, `LionMD_Gusto_${state.currentPeriod.period_label.replace(/\s+/g,'_')}.xlsx`)
    showToast('Gusto Excel exported!', 'success')
  } catch(e) { showToast('Export failed: ' + e.message, 'error') }
  finally { hideLoading() }
}
